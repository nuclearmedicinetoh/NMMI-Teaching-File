<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TOH NMMI Teaching Files – Home</title>
  <style>
    .top-nav {
      position: sticky;
      top: 0;
      background-color: #005EB8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: nowrap;
      padding: 12px 30px;
      z-index: 1000;
    }
    .top-nav a {
      color: white;
      text-decoration: none;
      margin-right: 20px;
      font-weight: 600;
    }
    .top-nav a:hover { text-decoration: underline; }
    .nav-logo { font-size: 1.2em; font-weight: 700; }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 18px;
      white-space: nowrap;
    }
    .nav-right { display: flex; align-items: center; }
    .nav-right input {
      width: 180px;
      padding: 6px 10px;
      border-radius: 5px;
      border: none;
      font-size: 0.95em;
    }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 30px 40px 90px 40px;
      background: #f5f5f5;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('Civic_Background.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      opacity: 0.75;
      z-index: -1;
    }
    .site-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      margin-bottom: 10px;
      border-bottom: 3px solid #005EB8;
      padding-bottom: 12px;
    }
    .header-center {
      grid-column: 2;
      justify-self: center;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
    }
    .title-part {
      margin: 0;
      color: #005EB8;
      font-size: 3.4em;
      font-weight: 700;
      letter-spacing: 0.5px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      white-space: nowrap;
    }
    .third-logo {
      height: 90px;
      width: auto;
      object-fit: contain;
    }
    .logo {
      height: 100px;
      width: auto;
      object-fit: contain;
    }
    .left-logo  { justify-self: start; }
    .right-logo { justify-self: end; }

    /* Enter Here button area */
    .home-enter {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 60px;
    }
    .enter-btn {
      display: inline-block;
      padding: 18px 56px;
      background-color: #005EB8;
      color: white;
      font-size: 1.3em;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      transition: background 0.18s, transform 0.15s;
    }
    .enter-btn:hover {
      background-color: #003f80;
      transform: translateY(-2px);
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 14px 20px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 0.9em;
      line-height: 1.8;
      z-index: 100;
    }
    .dropdown { position: relative; display: inline-block; }
    .dropbtn {
      background: none;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 1em;
      cursor: pointer;
      padding: 0;
    }
    .dropbtn:focus { outline: none; }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: white;
      min-width: 260px;
      margin-top: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      border-radius: 6px;
      overflow: visible;
      z-index: 1001;
      flex-direction: column;
    }
    .top-nav .dropdown-content a {
      color: #005EB8 !important;
      padding: 10px 14px;
      text-decoration: none;
      display: block;
      font-weight: 500;
    }
    .dropdown-content a:hover { background-color: #f0f4f8; }
    .show { display: block; }
    .dropdown-content > .dropdown { display: block; width: 100%; margin-bottom: 4px; }
    .dropdown-content .dropdown-content { position: absolute; left: 100%; top: 0; margin-top: 0; }
    .top-nav .dropdown-content a,
    .top-nav .dropdown-content button { color: #005EB8 !important; }
    #moreDropdown .dropdown-content { left: auto; right: 100%; }
    .dropdown-content button.dropbtn {
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      background: none;
      border: none;
      font-size: 0.95em;
      font-weight: 500;
      color: #005EB8;
      cursor: pointer;
      display: block;
    }
    .dropdown-content button.dropbtn:hover { background-color: #f0f4f8; }
    #homeDropdown   { min-width: 160px; }
    #indexesDropdown { min-width: 200px; }
  </style>
</head>

<body>


<header class="site-header">
  <img src="The_Ottawa_Hospital_Logo.png" alt="The Ottawa Hospital Logo" class="logo left-logo">
  <div class="header-center">
    <h1 class="title-part">Nuclear Medicine</h1>
    <img src="Nuc_Med_Logo.png" alt="Nuclear Medicine Logo" class="third-logo"
      onerror="this.style.display='none'">
    <h1 class="title-part">Teaching Archives</h1>
  </div>
  <img src="UOttawa_Med_Logo.png" alt="uOttawa Medicine Logo" class="logo right-logo">
</header>

<div class="home-enter">
  <a href="index.html" class="enter-btn">Enter Here</a>
</div>

<footer>
  Created by: Dr. Sebastian Mavromatis, MD &nbsp;·&nbsp;
  Supervised by: Dr. Alireza Khatami, MD &nbsp;·&nbsp;
  Special Thanks to: Philip Mavromatis (coding and structuring)
  <br>
  &copy; TOH Nuclear Medicine Teaching Files &middot; Educational Use Only
</footer>

<script>
  function toggleDropdown(id, event) {
    event.stopPropagation();
    const current   = document.getElementById(id);
    const container = current.closest('.dropdown');
    const siblingDropdowns = container.parentElement.querySelectorAll(':scope > .dropdown .dropdown-content');
    siblingDropdowns.forEach(d => {
      if (d !== current) d.classList.remove("show");
    });
    current.classList.toggle("show");
  }

  window.onclick = function(event) {
    if (!event.target.closest('.dropdown')) {
      const dropdowns = document.getElementsByClassName("dropdown-content");
      for (let i = 0; i < dropdowns.length; i++) {
        dropdowns[i].classList.remove("show");
      }
    }
  }
</script>
</body>
</html>
